employment:
  - title: Platform Engineer
    period: "2021 - Present"
    company: SAP
    urlToILogo: company-logos/sap-logo.png
    description: "Joined the Hyperspace team through a fellowship program, growing into a platform and security leadership role. Serve as Security Champion, driving secure-by-default practices across the team. Nominated to the security work stream for Project Horizon, a regional migration to BTP. Configured CI/CD workflows using Piper and GitHub Actions; managed secrets with Vault. Contributed to SAP Joule skills development for BMW, overseeing repo and pipeline. Defined and enforced engineering guidelines via code reviews and internal workshops."
    tech: "GitHub Actions, Piper, Vault, AWS, Kubernetes, Terraform, TypeScript, CI/CD"

  - title: Software Engineer
    period: "2020 - 2021"
    company: Anixe
    urlToILogo: company-logos/anixe-logo.svg
    description: "Led code audits to identify and present architectural anti-patterns before third-party handover. Built car rental search module for OTA platform using Angular 10 and NgRx. Contributed to a component library and back-office portal in a cost-cutting rotation during COVID-19. Published internal blog posts on Firebase testing, E2E automation, and Vue/Firebase auth flows."
    tech: "Angular 10, NgRx, Node.js, Firebase, Vue.js, Sass, Postman, Jest"

  - title: Software Engineer
    period: "2019 - 2019"
    company: Vonage
    urlToILogo: company-logos/vonage-logo.png
    description: "Co-authored React-based UI component library using Styled Components + Storybook. Defined global UI programming guidelines for all frontend teams across the org. Mentored the team's first intern, who later received a full-time contract. Delivered talk on Functional Programming with Ramda at internal meetup."
    tech: "React, Styled Components, Redux, Storybook, Webpack, Jest, Ramda"

  - title: Software Engineer
    period: "2017 - 2018"
    company: "SII Poland (Client Credit Suisse)"
    urlToILogo: company-logos/logo-sii.png
    description: "Developed NPM package to embed static SSRS reports inside Angular apps. Modernized internal KPIs dashboard from AngularJS to Angular 5. Demoed product iterations at sprint reviews for cross-functional stakeholders."
    tech: "Angular 5, AngularJS, RxJS, Jasmine, Karma, Lodash"

  - title: Software Engineer
    period: "2015 - 2017"
    company: Bank Safra
    urlToILogo: company-logos/safra-logo.png
    description: "Prototyped and shipped the company's first mobile application using Vue.js and Framework7. Built a proprietary Workflow system in AngularJS and Bootstrap. Automated data extraction from legacy systems using a C# scraper and cron job."
    tech: "AngularJS, Vue.js, Framework7, ASP.NET, Quartz, PL/SQL, Oracle, jQuery"

